id: multi-agent-transfer-continuity-003
domain: multi_agent
role_template: coordinator
category: transfer_continuity
difficulty: medium
user_goal: Complete a multi-agent coordination task using the transfer_continuity pattern.
user_context: The request spans multiple specialist roles and the coordinator must preserve context, avoid duplicate work,
  and aggregate the final answer.
user_known_info:
  coordination_id: coord-018
user_hidden_info:
  sensitive_note: Carry forward case nuance 18
max_user_turns: 10
available_tools:
- consult
- delegate
- transfer
- memory
- crm
- helpdesk
knowledge_articles: []
agent_constraints:
  shared_memory_visible: false
initial_state:
  coordination_records:
    coord-018:
      id: coord-018
      status: pending
      context_preserved: false
      duplicate_work: false
      results_aggregated: false
expected_state_changes:
- entity_type: coordination_records
  entity_id: coord-018
  operation: field_equals
  field: status
  expected_value: completed
- entity_type: coordination_records
  entity_id: coord-018
  operation: field_equals
  field: results_aggregated
  expected_value: true
expected_tool_calls:
- tool: coordination
  operation: transfer_continuity
  min_calls: 1
  max_calls: 3
forbidden_behaviors:
- Drop context during a handoff
- Duplicate the same subtask across agents
required_behaviors:
- Preserve context across handoffs
- Aggregate all subtask results into one coherent answer
expected_resolution: true
personas:
- clear_customer
agent_roles:
- support_lead
- technical_specialist
coordination_type: transfer_continuity
per_agent_expected_behaviors:
  support_lead:
  - support_lead handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
  technical_specialist:
  - technical_specialist handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
