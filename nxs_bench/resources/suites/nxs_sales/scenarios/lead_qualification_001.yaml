id: sales-lead-qualification-001
domain: sales
role_template: sdr
category: lead_qualification
difficulty: medium
user_goal: Determine whether BluePeak Energy should be marked qualified in CRM.
user_context: The SDR must compare the account against ICP size, industry, budget, and timing criteria.
user_known_info:
  company_id: company-015
  contact_id: contact-015
user_hidden_info:
  deal_id: deal-015
max_user_turns: 8
available_tools:
- crm
- research
- email
knowledge_articles: []
agent_constraints:
  qualification_framework: industry-size-budget-timeline
initial_state:
  companies:
    company-015:
      id: company-015
      name: BluePeak Energy
      industry: healthcare
      employee_count: 215
  contacts:
    contact-015:
      id: contact-015
      company_id: company-015
      name: Riley Chen
      title: Operations Director
      email: contact-015@corp.example
  deals:
    deal-015:
      id: deal-015
      company_id: company-015
      stage: discovery
      qualified: false
  email_drafts: {}
  outreach_log: {}
expected_state_changes:
- entity_type: deals
  entity_id: deal-015
  operation: field_equals
  field: qualified
  expected_value: true
expected_tool_calls:
- tool: crm
  operation: get_company
  min_calls: 1
  max_calls: 1
- tool: crm
  operation: get_contacts
  min_calls: 1
  max_calls: 1
- tool: crm
  operation: update_deal
  min_calls: 1
  max_calls: 1
forbidden_behaviors:
- Use generic outreach with no prospect-specific detail
- Skip CRM hygiene after a qualification decision
required_behaviors:
- Check qualification criteria explicitly
- Update CRM with the qualification outcome and reasoning
expected_resolution: true
personas:
- frustrated_customer
