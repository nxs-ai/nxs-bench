id: sales-multi-prospect-batch-001
domain: sales
role_template: sdr
category: multi_prospect_batch
difficulty: adversarial
user_goal: Research and qualify multiple prospects in a single batch run.
user_context: The SDR is asked to fan out across a short list of accounts without losing per-prospect detail.
user_known_info:
  company_id: company-046
  contact_id: contact-046
user_hidden_info:
  deal_id: deal-046
max_user_turns: 8
available_tools:
- crm
- research
- email
knowledge_articles: []
agent_constraints:
  qualification_framework: industry-size-budget-timeline
initial_state:
