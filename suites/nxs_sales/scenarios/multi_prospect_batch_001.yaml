    company-046:
      id: company-046
      name: Harbor Logistics
      industry: ecommerce
      employee_count: 246
  contacts:
    contact-046:
      id: contact-046
      company_id: company-046
      name: Morgan Patel
      title: Operations Director
      email: contact-046@corp.example
  deals:
    deal-046:
      id: deal-046
      company_id: company-046
      stage: discovery
      qualified: false
  email_drafts: {}
  outreach_log: {}
expected_state_changes: []
expected_tool_calls:
- tool: research
  operation: search_web
  min_calls: 3
  max_calls: 8
- tool: crm
  operation: get_company
  min_calls: 3
  max_calls: 6
- tool: crm
  operation: update_deal
  min_calls: 3
  max_calls: 6
