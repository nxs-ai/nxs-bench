id: multi-agent-parallel-delegation-001
domain: multi_agent
role_template: coordinator
category: parallel_delegation
difficulty: hard
user_goal: Complete a multi-agent coordination task using the parallel_delegation pattern.
user_context: The request spans multiple specialist roles and the coordinator must preserve context, avoid duplicate work,
  and aggregate the final answer.
user_known_info:
  coordination_id: coord-021
user_hidden_info:
  sensitive_note: Carry forward case nuance 21
max_user_turns: 10
available_tools:
- consult
- delegate
- transfer
- memory
- crm
- helpdesk
knowledge_articles: []
agent_constraints:
  shared_memory_visible: false
initial_state:
  coordination_records:
    coord-021:
      id: coord-021
      status: pending
      context_preserved: false
      duplicate_work: false
      results_aggregated: false
expected_state_changes:
- entity_type: coordination_records
  entity_id: coord-021
  operation: field_equals
  field: status
  expected_value: completed
- entity_type: coordination_records
  entity_id: coord-021
  operation: field_equals
  field: results_aggregated
  expected_value: true
expected_tool_calls:
- tool: coordination
  operation: parallel_delegation
  min_calls: 1
  max_calls: 3
forbidden_behaviors:
- Drop context during a handoff
- Duplicate the same subtask across agents
required_behaviors:
- Preserve context across handoffs
- Aggregate all subtask results into one coherent answer
expected_resolution: true
personas:
- multi_language_customer
agent_roles:
- support_lead
- billing_specialist
coordination_type: parallel_delegation
per_agent_expected_behaviors:
  support_lead:
  - support_lead handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
  billing_specialist:
  - billing_specialist handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
