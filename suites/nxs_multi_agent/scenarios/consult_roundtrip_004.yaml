id: multi-agent-consult-roundtrip-004
domain: multi_agent
role_template: coordinator
category: consult_roundtrip
difficulty: easy
user_goal: Complete a multi-agent coordination task using the consult_roundtrip pattern.
user_context: The request spans multiple specialist roles and the coordinator must preserve context, avoid duplicate work,
  and aggregate the final answer.
user_known_info:
  coordination_id: coord-004
user_hidden_info:
  sensitive_note: Carry forward case nuance 4
max_user_turns: 10
available_tools:
- consult
- delegate
- transfer
- memory
- crm
- helpdesk
knowledge_articles: []
agent_constraints:
  shared_memory_visible: false
initial_state:
  coordination_records:
    coord-004:
      id: coord-004
      status: pending
      context_preserved: false
      duplicate_work: false
      results_aggregated: false
expected_state_changes:
- entity_type: coordination_records
  entity_id: coord-004
  operation: field_equals
  field: status
  expected_value: completed
- entity_type: coordination_records
  entity_id: coord-004
  operation: field_equals
  field: results_aggregated
  expected_value: true
expected_tool_calls:
- tool: coordination
  operation: consult_roundtrip
  min_calls: 1
  max_calls: 3
forbidden_behaviors:
- Drop context during a handoff
- Duplicate the same subtask across agents
required_behaviors:
- Preserve context across handoffs
- Aggregate all subtask results into one coherent answer
expected_resolution: true
personas:
- clear_customer
agent_roles:
- dispatcher
- resolution_owner
- knowledge_curator
coordination_type: consult_roundtrip
per_agent_expected_behaviors:
  dispatcher:
  - dispatcher handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
  resolution_owner:
  - resolution_owner handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
  knowledge_curator:
  - knowledge_curator handles its assigned subtask cleanly
  - Preserve context across the coordination boundary
